name: Manuscript Compilation
on:
  push:
    tags:
      - '*.*.*' # semantic versioning
jobs:
  build_latex:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Install Guix
        uses: PromyLOPh/guix-install-action@v1
        with:
          channels: |-
            (list (channel
              (name 'guix)
              (url "https://https://codeberg.org/guix/guix.git")
              (branch "master")
              (commit
                "c16785a11e2c9f7c144d4de222f1df14ceaa86ab")
              (introduction
                (make-channel-introduction
                  "9edb3f66fd807b096b48283debdcddccfea34bad"
                  (openpgp-fingerprint
                    "BBB0 2DDF 2CEA F6A8 0D1D  E643 A2A0 6DF2 A33A 54FA")))))
      - name: Ensure no locale warning
        run: test -z "$(guix --version 2>&1 >/dev/null)"
      - name: Set up Git repository
        uses: actions/checkout@v2
      - name: Compile manuscript
        working-directory: papers/primary_manuscript
        run: |
          guix time-machine -C channels.scm -- shell --pure -m manifest.scm -- \
          latexmk Report.tex
      - name: Compile supplementary info
        working-directory: papers/primary_manuscript
        run: |
          guix time-machine -C channels.scm -- shell --pure -m manifest.scm -- \
          latexmk SupplementaryInformation.tex
      - name: Create Release
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          artifacts: papers/primary_manuscript/Report.pdf,papers/primary_manuscript/SupplementaryInformation.pdf
          artifactContentType: application/pdf
